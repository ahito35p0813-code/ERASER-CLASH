<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERASER CLASH</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="title-screen">

    <img src="8F5B4514-4724-4D1F-BA23-085E0B13F7E8.png" id="logo" alt="ERASER CLASH">

    <p class="subtitle">
      最後まで消し合うサバイバル
    </p>

    <p id="tap">
      TAP TO START
    </p>

  </div>

　<!-- バトル画面 -->
<div id="battle-screen">

    <div id="arena">

        <div class="player cpu" id="cpu2">
            <div class="eraser">CPU2</div>
            <div class="hp">HP 20</div>
        </div>

        <div class="player cpu" id="cpu1">
            <div class="eraser">CPU1</div>
            <div class="hp">HP 20</div>
        </div>

        <div class="player cpu" id="cpu3">
            <div class="eraser">CPU3</div>
            <div class="hp">HP 20</div>
        </div>

        <div class="player cpu" id="cpu4">
            <div class="eraser">CPU4</div>
            <div class="hp">HP 20</div>
        </div>

        <div class="player me" id="me">

    <div class="hp">HP20</div>

    <div class="equip">

        <div class="defense">防</div>
        <div class="defense">防</div>
        <div class="field">場</div>

    </div>

    <div class="eraser big">
        自分
    </div>

    <div class="attack">
        攻カード
    </div>

    <div class="hand player-hand">
        手札
    </div>

</div>

        <div id="center">

            <div class="deck">
                山札
            </div>

            <div class="trash">
                捨て札
            </div>

        </div>

    </div>

</div>

  <script src="script.js"></script>

</body>
</html>
